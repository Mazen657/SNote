name: snote
description: A secure, encrypted, offline-first notes application.
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2

  # Encryption
  encrypt: ^5.0.3
  crypto: ^3.0.3
  cryptography: ^2.7.0

  # Authentication
  local_auth: ^2.3.0

  # UI utilities
  google_fonts: ^6.2.1
  gap: ^3.0.1
  flutter_staggered_animations: ^1.1.1
  intl: ^0.19.0

  # General utilities
  uuid: ^4.5.1
  path_provider: ^2.1.4
  share_plus: ^12.0.2
  file_picker: ^8.1.3
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true